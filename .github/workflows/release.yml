name: release binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: ani-cli-linux-x86_64
          - runner: macos-13
            target: x86_64-apple-darwin
            asset_name: ani-cli-macos-x86_64
          - runner: macos-14
            target: aarch64-apple-darwin
            asset_name: ani-cli-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/ani-cli" "dist/ani-cli"
          cp README.md LICENSE disclaimer.md "dist/"
          tar -czf "${{ matrix.asset_name }}.tar.gz" -C dist .

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME:-${GITHUB_REF#refs/tags/}}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --generate-notes
          fi
          gh release upload "$tag" "${{ matrix.asset_name }}.tar.gz" --clobber
